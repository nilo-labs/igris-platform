name: CI -Igris Platform

on: 
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  quality:
    name: Code Quality & Linting
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Code checkout
        uses: actions/checkout@v4

      - name: 📦 PNPM Install
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: 🧩 Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: 🕵️‍♂️ Run Biome (Linter e Formatter)
        run: npx @biomejs/biome ci .