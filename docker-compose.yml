services:
  postgres:
    image: postgres:16-alpine
    container_name: igris_postgres
    ports:
      - '5433:5432'
    environment:
      - POSTGRES_USER=docker
      - POSTGRES_PASSWORD=docker
      - POSTGRES_DB=igris
    volumes:
      - igris_pg_data:/var/lib/postgresql/data

  influxdb:
    image: influxdb:2.7-alpine
    container_name: igris_influxdb
    restart: always
    ports:
      - '8086:8086'
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=admin
      - DOCKER_INFLUXDB_INIT_PASSWORD=adminpassword
      - DOCKER_INFLUXDB_INIT_ORG=igris
      - DOCKER_INFLUXDB_INIT_BUCKET=logs
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=supersecrettoken123
    volumes:
      - influxdb_data:/var/lib/influxdb2

  grafana: 
    image: grafana/grafana:latest
    container_name: igris_grafana
    restart: always
    ports:
      - '3000:3000'
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=adminpassword
    depends_on:
      - influxdb
    volumes:
      - grafana_data:/var/lib/grafana


volumes:
  igris_pg_data:
  influxdb_data: 
  grafana_data: