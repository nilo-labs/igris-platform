services:
  postgres:
    image: postgres:16-alpine
    container_name: igris_postgres
    ports:
      - '5433:5432'
    environment:
      - POSTGRES_USER=docker
      - POSTGRES_PASSWORD=docker
      - POSTGRES_DB=igris
    volumes:
      - igris_pg_data:/var/lib/postgresql/data

volumes:
  igris_pg_data: